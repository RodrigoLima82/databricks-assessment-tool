read_terraform_files_task:
  description: |
    Use the Terraform Directory Summarizer tool to analyze all Terraform files in {directory_path}.
    This tool generates a statistical summary without reading all file contents, optimized for
    rate-limit constraints. The summary includes:
    - Total counts of each resource type (clusters, jobs, notebooks, users, etc.)
    - Key configuration patterns (autoscaling, node types, runtimes, schedules)
    - Compute configurations (cluster sizes, autoscaling settings)
    - Job statistics (task counts, scheduled jobs, notifications)
    - SQL Compute details (warehouse sizes, auto-stop configurations)
    - User and group information (including administrators)
    - Code file counts (.py and .sql notebooks)
    
    **IMPORTANT**: Use the "Terraform Directory Summarizer" tool with the directory path
    provided in {directory_path}. This will return a complete statistical summary.
    
    **SAVE YOUR ANALYSIS**: After analyzing, use FileWriterTool to save your findings to:
    {output_file_path}Terraform_Infrastructure_Analysis.md
  expected_output: |
    A structured report saved as Terraform_Infrastructure_Analysis.md containing:
    - A breakdown of all key components and configurations extracted from the Terraform files.
    - Quantities of each resource type
    - Resource counts and compute configurations.
    - Detailed summaries of jobs, clusters, and SQL Compute settings.
    - Counts of administrators, catalogs, tables, schemas, and code files.
    
    MUST use FileWriterTool to save the file.
  async_execution: false
  agent: terraform_reader
  max_iter: 20
  max_rpm: 10

databricks_assessment:
  description: |
    Conduct a thorough review of all Databricks configurations identified from the Terraform files. 
    Provide insights, highlight deviations from best practices, and suggest optimizations. 
    
    **EXCLUDE FINANCIAL TOPICS**: Do NOT include cost optimization, financial impact, or budget recommendations.
    
    Focus on:
    - Identification of non-standard or modified settings.
    - Quantities of each resource type
    - Detection of oversized clusters or inefficient autoscaling configurations.
    - Analysis of external libraries and their usage.
    - Clusters not enabled with Unity Catalog.
    - Databricks Runtime versions older than 14.3.
    - Jobs assigned to individual (personal) owners.
    - Jobs lacking configured alerts.
    - High-access or security concerns (e.g., overly permissive access).
    - SQL Compute resources that are over-provisioned.
    - Workspace administrators and their activities.
    - Additional best practice recommendations tailored to the specific environment.
    
    **SAVE YOUR ANALYSIS**: After analyzing, use FileWriterTool to save your findings to:
    {output_file_path}Databricks_Security_Performance_Analysis.md
  expected_output: |
    A comprehensive report saved as Databricks_Security_Performance_Analysis.md including:
    - Identified non-standard configurations.
    - Quantities of each resource type
    - Potential security risks and misconfigurations.
    - Recommendations for cluster right-sizing and optimization.
    - Best practices to improve overall efficiency and security.
    
    MUST use FileWriterTool to save the file.
    DO NOT include financial or cost information.
  async_execution: false
  agent: databricks_specialist
  context:
    - read_terraform_files_task
  max_iter: 20
  max_rpm: 10

